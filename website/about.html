<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sublingualism — About</title>
    <meta name="description" content="Stereoscopic video art from modular synthesis. 24/7 live stream on Twitch.">
    <link rel="canonical" href="https://sublingualism.com/about.html">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sublingualism.com/about.html">
    <meta property="og:title" content="Sublingualism — About">
    <meta property="og:description" content="Stereoscopic video art from modular synthesis. 24/7 live stream on Twitch.">
    <meta property="og:image" content="https://d2xbllb3qhv8ay.cloudfront.net/images/gear.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
        }
        @media (min-width: 600px) {
            .container { padding: 2rem; }
        }
        .nav {
            margin-bottom: 2rem;
        }
        .nav a {
            color: #fff;
            text-decoration: none;
            opacity: 0.7;
        }
        .nav a:hover {
            opacity: 1;
        }
        .section {
            margin-bottom: 3rem;
        }
        p {
            font-size: 0.95rem;
            line-height: 1.7;
            font-weight: 300;
            opacity: 0.85;
            margin: 0 0 1rem 0;
        }
        .gear-photo img {
            width: 100%;
            display: block;
        }
        .link-item {
            display: block;
            margin-bottom: 0.75rem;
        }
        .link-item a {
            color: #fff;
            text-decoration: none;
            opacity: 0.7;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 2px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .link-item a:hover {
            opacity: 1;
            border-bottom-color: rgba(255,255,255,0.8);
        }
        .contact {
            font-size: 0.85rem;
            opacity: 0.5;
        }
        .contact a {
            color: #fff;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 1px;
            transition: all 0.3s ease;
        }
        .contact a:hover {
            opacity: 1;
            border-bottom-color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">← home</a>
        </div>

        <div class="section">
            <p>I make experimental video and sound and live in Oakland, California.</p>
        </div>

        <div class="section" id="about-text"></div>

        <div class="section gear-photo">
            <img src="https://d2xbllb3qhv8ay.cloudfront.net/images/gear.jpg" alt="" loading="lazy" decoding="async">
        </div>

        <div class="section">
            <div class="link-item">
                <a href="https://twitch.tv/sublinguist">mostly 24/7 stream → twitch.tv/sublinguist</a>
            </div>
            <div class="link-item">
                <a href="/work.html">work →</a>
            </div>
        </div>

        <div class="section contact">
            <a href="mailto:someone.named.paul@gmail.com">someone.named.paul@gmail.com</a>
        </div>
    </div>
    <script>
        fetch('/about.txt').then(r => r.text()).then(function(text) {
            var el = document.getElementById('about-text');
            text.trim().split(/\n\n+/).forEach(function(para) {
                var p = document.createElement('p');
                p.innerHTML = para.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                el.appendChild(p);
            });
        });
    </script>
    <script data-goatcounter="https://sublingualism.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
</html>
