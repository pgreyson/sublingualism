<body>

<div id='blissdripsContainer'></div>
<div id='popup'>
    <div id='popupContents'>
        <div id='title'>
            <div id='logo'>Bliss Drips&#x2122;</div>
            <div id='for'>for</div>
            <div id='titleName'></div>
        </div>
        <div id='waters'></div>
    </div>
</div>
<div id='welcome'>
    <div id='welcomePanel'>
        <div id='welcomeTitle'>
            <span>Welcome to</span><span id='logo'>Bliss Drips&#x2122;</span>
        </div>
        <input id='name' placeholder='Please Enter Your Name'></input>
        <div id='buttons'>
            <div id='new' class='button'>New Account</div>
            <div id='returning' class='button'>Sign In</div>
        </div>
    </div>
</div>
<div id='myBlissDrips'>
        <div id='hello'>HELLO</div>
        <div id='signout'>Sign Out</div>
</div>

<script>

var currentCustomer;

var useLocalStorage = true;

function saveCurrentCustomer(cb) {
    localStorage['blissdrips_' + currentCustomer.name] = JSON.stringify(currentCustomer);
    if (cb) {
        cb();
    }
}

function getCustomer(name, cb) {
    var key = 'blissdrips_' + name;
    if (localStorage[key]) {
        cb(null, JSON.parse(localStorage[key]));
    } else {
        cb(true);
    }
}

function customerHasWater(water) {
    return currentCustomer.waters.indexOf(water) != -1;
}

function addWaterForCustomer(water) {
    if (!customerHasWater(water)) {
        currentCustomer.waters.push(water);
    }
    saveCurrentCustomer();
}

function removeWaterForCustomer(water) {
    var index = currentCustomer.waters.indexOf(water);
    if (index != -1) {
        currentCustomer.waters.splice(index, 1);
    }
    saveCurrentCustomer();
}

function hideDripList() {
    d3.select('#popup').style('opacity', 0);
    d3.select('#popup').style('pointer-events', 'none');
}

function updateDripList(data) {
    function waterOpacity(water) {
        return customerHasWater(water) ? 1 : .75;
    }

    d3.select('#popup').style('pointer-events', 'auto');
    d3.select('#titleName').text(data.name);

    var water = d3.select('#waters').selectAll('div').data(data.waters);
    water.enter().append('div')
        .attr('class', 'water')
        .on('mouseenter', function () {
            var touchPoint = d3.select(this);
            touchPoint.style('opacity', 1);
        })
        .on('mouseleave', function (water) {
            var touchPoint = d3.select(this);
            touchPoint.classed('selected', customerHasWater);
            touchPoint.style('opacity', '');
        })
        .on('touchstart', function () {
            var touchPoint = d3.select(this);
            touchPoint.style('opacity', 1);
        })
        .on('touchend', function () {
            var touchPoint = d3.select(this);
            touchPoint.classed('selected', customerHasWater);
            touchPoint.style('opacity', '');
        });

    water.on('click', function (water) {
            d3.event.stopPropagation();
            if (customerHasWater(water)) {
                removeWaterForCustomer(water);
            } else {
                addWaterForCustomer(water);
            }

            updateDripList(data);
        });

    water.classed('selected', customerHasWater);

    water.text(function (d) {return d;});
    water.exit().remove();

    d3.select('#popup').style('opacity', 0);
    d3.select('#popup').style('-webkit-transition', 'opacity .5s, -webkit-transform .5s');
    setTimeout(function () {
        d3.select('#popup').style('opacity', .999);
    });
}

function addChakraHandlers(chakra) {
    var chakraOpacity = .5;
    var data = chakras[chakra];

    d3.select('#'+chakra)
        .style('opacity', chakraOpacity)
        .style('-webkit-transition', 'opacity .25s')
        .on('mouseenter', function () {
            var touchPoint = d3.select(this);
            touchPoint.style('opacity', 1);
        })
        .on('mouseleave', function () {
            var touchPoint = d3.select(this);
            touchPoint.style('opacity', chakraOpacity);
        })
        .on('touchstart', function () {
            var touchPoint = d3.select(this);
            touchPoint.style('opacity', 1);
        })
        .on('touchend', function () {
            var touchPoint = d3.select(this);
            touchPoint.style('opacity', chakraOpacity);
        })
        .on('click', function () {
            updateDripList(data);
        });
}

function addChakrasHandlers() {
    for (var chakra in chakras) {
        addChakraHandlers(chakra);
    }
}

function addButtonHandlers(button) {
    button.on('mouseenter', function () {
        d3.select(this).style('background-color',  'rgba(255, 255, 255, .25)');
    });
    button.on('mouseleave', function () {
        d3.select(this).style('background-color',  'transparent');
    });
    button.on('touchstart', function () {
        d3.select(this).style('background-color',  'rgba(255, 255, 255, .25)');
    });
    button.on('touchend', function () {
        d3.select(this).style('background-color',  'transparent');
    });
}


function hideWelcome() {
    d3.select('#welcome').style('opacity', 0);
    d3.select('#welcome').style('pointer-events', 'none');
    d3.select('#myBlissDrips').style('opacity', 1);
    d3.select('#new').style('pointer-events', 'none');
    d3.select('#new').style('background-color',  'transparent');
    d3.select('#returning').style('pointer-events', 'none');
    d3.select('#returning').style('background-color',  'transparent');

    d3.select('#hello').html("Bliss Drips&#x2122; for " + currentCustomer.name);
}

function showWelcome() {
    d3.select('#hello').text('');
    d3.select('#welcome').style('opacity', 1);
    d3.select('#welcome').style('pointer-events', 'auto');
    d3.select('#new').style('pointer-events', 'none');
    d3.select('#returning').style('pointer-events', 'none');
    d3.select('#new').style('opacity', .5);
    d3.select('#returning').style('opacity', .5);
    d3.select('#myBlissDrips').style('opacity', 0);

    hideDripList();
}

function getNormalizedName() {
    return d3.select('#name').property('value').trim();
}

function addButtonsHandlers() {
    d3.select('#name').on('input', function () {
        d3.select('#new').style('opacity', this.value ? 1 : .5);
        d3.select('#returning').style('opacity', this.value ? 1 : .5);
        d3.select('#new').style('pointer-events', this.value ? 'auto' : 'none');
        d3.select('#returning').style('pointer-events', this.value ? 'auto' : 'none');
    });

    addButtonHandlers(d3.select('#new'));
    addButtonHandlers(d3.select('#returning'));

    d3.select('#new').on('click', function () {
        document.getElementById('name').blur();

        var name = getNormalizedName();

        getCustomer(name, function (error, json) {
            if (json) {
                alert('Sorry that name is already in use.')
            } else {
                currentCustomer = {name: name, waters: []};
                saveCurrentCustomer(function () {
                    hideWelcome();
                })
            }
        });
    });
    d3.select('#returning').on('click', function () {
        document.getElementById('name').blur();

        var name = getNormalizedName();
        getCustomer(name, function (error, json) {
            if (error) {
                alert('Sorry we could not find your data.')
            } else {
                currentCustomer = json;
                if (!currentCustomer.waters) {
                    currentCustomer.waters = [];
                }
                hideWelcome();
            }
        });
    });

    d3.select('#signout').on('click', function () {
        d3.select('#name').property('value', '');
        showWelcome();
    });
}

window.addEventListener('load', function () {
    d3.xml('blissdrips.svg', function (xml) {
        var blissdrips = document.importNode(xml.documentElement, true);
        blissdrips.id = 'blissdrips';
        document.getElementById('blissdripsContainer').appendChild(blissdrips);

        blissdrips = d3.select('#blissdrips');
        blissdrips.attr('viewBox', '0 0 ' + blissdrips.attr('width') + ' ' + blissdrips.attr('height'));

        addChakrasHandlers();
        d3.select('#popup').on('click', function () {
            hideDripList();
        });

        d3.select('#welcome').style('visibility', 'visible');
        setTimeout(function () {
            d3.select('#welcome').style('opacity', 1);
        });
        addButtonsHandlers();

        d3.select('#hello').on("click", function () {
            updateDripList(currentCustomer);
        });
    });
});

</script>
