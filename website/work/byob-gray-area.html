            cursor: pointer;

        }
        .clip::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.15);
            border-top-color: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            transform: translate(-50%,-50%);
        }
        .clip.loaded::before {
            display: none;
        }
        .clip img {
            width: 100%;
            display: block;
        }
        .empty {
            font-size: 0.9rem;
            line-height: 1.7;
